<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travis Music Library</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0d11; color: #ddd; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: #141420; border-bottom: 1px solid #22223a; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
.search-wrap { flex: 1; position: relative; }
.search { width: 100%; background: #1c1c2e; border: 1px solid #2a2a44; border-radius: 6px; padding: 7px 12px 7px 30px; color: #e0e0e0; font-size: 13px; outline: none; transition: border-color .15s; }
.search:focus { border-color: #9098ff; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #555; pointer-events: none; font-size: 13px; }
.hstat { font-size: 11px; color: #555; white-space: nowrap; }
.hstat b { font-size: 13px; }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 200px; background: #111118; border-right: 1px solid #1a1a28; overflow-y: auto; flex-shrink: 0; padding-bottom: 16px; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: #2a2a44; border-radius: 2px; }

.nav-all { display: flex; align-items: center; gap: 7px; padding: 9px 14px; cursor: pointer; font-size: 13px; color: #888; border-bottom: 1px solid #1a1a28; margin-bottom: 2px; transition: all .12s; border-left: 2px solid transparent; }
.nav-all:hover { color: #ccc; background: #18182a; }
.nav-all.active { color: #9098ff; background: #9098ff10; border-left-color: #9098ff; }
.nav-all-count { margin-left: auto; background: #ffffff08; border-radius: 10px; padding: 1px 7px; font-size: 10px; color: #555; }

.nav-grp-head { display: flex; align-items: center; padding: 12px 14px 4px; cursor: pointer; gap: 6px; user-select: none; }
.nav-grp-label { font-size: 10px; color: #3a3a5a; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; flex: 1; }
.nav-grp-badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }

.nav-item { display: flex; align-items: center; gap: 7px; padding: 5px 14px; cursor: pointer; font-size: 12px; color: #777; transition: all .12s; border-left: 2px solid transparent; user-select: none; }
.nav-item:hover { color: #ccc; background: #18182a; }
.nav-item.a0 { color: #aab0ff; background: #9098ff10; border-left-color: #9098ff; }   /* KIE */
.nav-item.a1 { color: #ffa888; background: #ff907010; border-left-color: #ff9070; }   /* SA  */
.nav-item.a2 { color: #90e0a8; background: #70d09010; border-left-color: #70d090; }   /* GS  */
.nav-item.a3 { color: #ffe07a; background: #ffd16610; border-left-color: #ffd166; }   /* Thor */
.nav-item.a4 { color: #c0a0ff; background: #aa77ff10; border-left-color: #aa77ff; }   /* Seth */
.nav-item .nav-icon { font-size: 13px; flex-shrink: 0; width: 17px; text-align: center; }
.nav-item .nav-label { flex: 1; }
.nav-item .nav-cnt { background: #ffffff08; border-radius: 10px; padding: 1px 6px; font-size: 10px; color: #555; }

/* Main */
.main { flex: 1; overflow-y: auto; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: #2a2a44; border-radius: 3px; }

.src-bar { padding: 9px 20px 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; background: #0d0d11; }
.src-bar::after { content: ''; flex: 1; height: 1px; background: #1a1a28; }
.src-bar.s0 { color: #9098ff66; } .src-bar.s1 { color: #ff907066; } .src-bar.s2 { color: #70d09066; }
.src-bar.s3 { color: #ffd16666; } .src-bar.s4 { color: #aa77ff66; }

.sec-head { position: sticky; top: 0; background: #0d0d11ee; backdrop-filter: blur(6px); z-index: 10; padding: 6px 20px; border-bottom: 1px solid #18182a; display: flex; align-items: center; gap: 8px; }
.sec-head h2 { font-size: 12px; font-weight: 600; color: #888; }
.sec-badge { border-radius: 12px; padding: 1px 8px; font-size: 11px; }
.b0 { background: #9098ff18; color: #9098ff; } .b1 { background: #ff907018; color: #ff9070; }
.b2 { background: #70d09018; color: #70d090; } .b3 { background: #ffd16618; color: #ffd166; }
.b4 { background: #aa77ff18; color: #aa77ff; }

.track { display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #14141c; min-height: 42px; transition: background .1s; }
.track:hover { background: #17172a; }
.track.p0 { background: #9098ff0c; border-left: 2px solid #9098ff; padding-left: 14px; }
.track.p1 { background: #ff90700c; border-left: 2px solid #ff9070; padding-left: 14px; }
.track.p2 { background: #70d0900c; border-left: 2px solid #70d090; padding-left: 14px; }
.track.p3 { background: #ffd1660c; border-left: 2px solid #ffd166; padding-left: 14px; }
.track.p4 { background: #aa77ff0c; border-left: 2px solid #aa77ff; padding-left: 14px; }

.track-idx { width: 24px; font-size: 10px; color: #3a3a5a; flex-shrink: 0; text-align: right; margin-right: 10px; }
.track-name { flex: 0 0 210px; font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; }
.track.p0 .track-name { color: #c0c6ff; } .track.p1 .track-name { color: #ffb8a0; }
.track.p2 .track-name { color: #a0e8b8; } .track.p3 .track-name { color: #ffe8a0; }
.track.p4 .track-name { color: #d0b8ff; }
.track-audio { flex: 1; min-width: 0; }
.track-audio audio { width: 100%; height: 28px; filter: invert(1) hue-rotate(180deg) brightness(0.72) saturate(0.5); }
.track-dl { flex-shrink: 0; margin-left: 8px; color: #3a3a5a; text-decoration: none; font-size: 14px; padding: 4px 6px; border-radius: 4px; transition: all .12s; line-height: 1; }
.track-dl:hover { color: #9098ff; background: #9098ff18; }

.empty-state { padding: 60px 20px; text-align: center; color: #444; font-size: 14px; }
.hidden { display: none !important; }

/* Login Overlay */
#login-overlay { position: fixed; inset: 0; background: #0d0d11; z-index: 9999; display: flex; align-items: center; justify-content: center; }
#login-overlay.hidden { display: none; }
.login-box { background: #141420; border: 1px solid #2a2a44; border-radius: 12px; padding: 40px 36px; width: 320px; display: flex; flex-direction: column; gap: 20px; }
.login-logo { text-align: center; font-size: 28px; margin-bottom: 4px; }
.login-title { text-align: center; font-size: 15px; font-weight: 700; color: #fff; }
.login-sub { text-align: center; font-size: 11px; color: #555; margin-top: -12px; }
.login-err { color: #ff6b6b; font-size: 12px; text-align: center; min-height: 16px; margin-top: 4px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
.login-box.shake { animation: shake .35s ease; }

/* Now bar */
.now-bar { background: #141420; border-top: 1px solid #22223a; padding: 6px 20px; display: none; align-items: center; gap: 10px; flex-shrink: 0; font-size: 12px; }
.now-bar.visible { display: flex; }
.now-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; animation: pulse 1.4s infinite; }
.nd0{background:#9098ff;} .nd1{background:#ff9070;} .nd2{background:#70d090;} .nd3{background:#ffd166;} .nd4{background:#aa77ff;}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.now-src { color: #555; flex-shrink: 0; }
.now-title { color: #bbb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>

// ─── Classify functions ───────────────────────────────────
function classifyKIE(f, folder) {
  const n = f.toLowerCase().replace(/\.mp3$/i,'');
  if (folder==='bgm') {
    if (/jpop|j_pop/.test(n)) return 'J-Pop';
    if (/tropical/.test(n))   return 'Tropical';
    if (/anime/.test(n))      return 'Anime';
    if (/chinese/.test(n))    return 'Chinese';
    if (/^se_/.test(n))       return '系統音效';
    return '遊戲 BGM';
  }
  if (/^se_|^4scatter$|^changewin$|^symb_/.test(n)) return '遊戲介面';
  if (/\bvoice\b|vocal|\bfemale\b/.test(n))          return '人聲音效';
  if (/chime|shimmer|sparkle|\bbell\b/.test(n))       return '金屬音效';
  if (/brake|ratchet|mechanical|\broll\b|\bglide\b/.test(n)) return '機械音效';
  if (/\bthud\b|impact|clash|explosive/.test(n))      return '撞擊音效';
  if (/circuit|engine\b|cyber|clockwork|skyfire|skyforge|celestial|wealth|synth|electronic/.test(n)) return '電子科技';
  return '冒險奇幻';
}

function classifyThor(f) {
  const n = f.replace(/\.mp3$/i,'');
  if (/^Music_(Base_|Free_|Pre_Free)/.test(n)) return 'BGM';
  if (/^Music_/.test(n))                        return '大獎音樂';
  if (/^Voice_/.test(n))                        return '配音';
  if (/^Sound_(F1_|F4_|F5_|FG_|Free_|HitB)/.test(n)) return 'Free Game';
  if (/^Sound_(BG_Symbol_|FG_Symbol_|Spin|Fast_Spin|Symbol_)/.test(n)) return '轉輪音效';
  if (/^Sound_(Win|TotalWin|BigWin_|JP_|Multi_)/.test(n)) return '得獎音效';
  return '按鈕 / UI';
}

function classifySeth(f) {
  const n = f.replace(/\.mp3$/i,'');
  if (/^bgm_/.test(n))                          return 'BGM';
  if (/^btm_(T_fg_|fg_|fc$)/.test(n))           return 'Free Game';
  if (/^btm_scatter_/.test(n))                   return 'Scatter';
  if (/^btm_w_/.test(n))                         return '得獎音樂';
  if (/^btm_(multi_|muti_|totalTimes)/.test(n))  return '乘數系統';
  return '遊戲音效';
}

let allTracks = [];

function init() {
  KIE_BGM.forEach(f => allTracks.push({file:f, path:`bgm/${f}`,   cat:classifyKIE(f,'bgm'), src:'kie', cls:0}));
  KIE_SFX.forEach(f => allTracks.push({file:f, path:`sfx/${f}`,   cat:classifyKIE(f,'sfx'), src:'kie', cls:0}));
  SA_FILES.forEach(t => allTracks.push({file:t.p.split('/').pop(), path:t.p, cat:t.cat, src:'sa',   cls:1}));
  GS_FILES.forEach(t => allTracks.push({file:t.p.split('/').pop(), path:t.p, cat:t.cat, src:'gs',   cls:2}));
  THOR_FILES.forEach(f => allTracks.push({file:f, path:`original/thor/${f}`, cat:classifyThor(f), src:'thor', cls:3}));
  SETH_FILES.forEach(f => allTracks.push({file:f, path:`original/seth/${f}`, cat:classifySeth(f), src:'seth', cls:4}));

  render();
}

// ═══════════════════════════════════════════════════════════
//  Sidebar
// ═══════════════════════════════════════════════════════════
function buildSidebar() {
  const counts = {}; // src -> cat -> n
  allTracks.forEach(t => {
    if (!counts[t.src]) counts[t.src] = {};
    counts[t.src][t.cat] = (counts[t.src][t.cat]||0)+1;
  });
  const srcTotal = src => Object.values(counts[src]||{}).reduce((a,b)=>a+b,0);

  let html = `<div class="nav-all ${activeKey==='all'?'active':''}" onclick="setKey('all',this)">
    <span>📁 全部</span><span class="nav-all-count">${allTracks.length}</span>
  </div>`;

  SOURCES.forEach((s,si) => {
    const total = srcTotal(s.key);
    if (!total) return;
    const cfg = CAT_CFG[s.key];
    const badgeStyle = [`#9098ff`,`#ff9070`,`#70d090`,`#ffd166`,`#aa77ff`][si];

    html += `<div class="nav-grp-head" onclick="setKey('${s.key}',document.querySelector('[data-src=\\'${s.key}\\']'))">
      <span class="nav-grp-label">${s.label}</span>
      <span class="nav-grp-badge" style="background:${badgeStyle}22;color:${badgeStyle}99">${total}</span>
    </div>
    <div class="nav-item ${activeKey===s.key?'a'+si:''}" data-src="${s.key}" onclick="setKey('${s.key}',this)">
      <span class="nav-icon">${s.icon}</span><span class="nav-label">全部</span>
      <span class="nav-cnt">${total}</span>
    </div>`;

    cfg.order.forEach(cat => {
      const n = (counts[s.key]||{})[cat]||0;
      if (!n) return;
      const icon = cfg.icons[cat]||'🎵';
      html += `<div class="nav-item ${activeKey===`${s.key}:${cat}`?'a'+si:''}" onclick="setKey('${s.key}:${cat}',this)">
        <span class="nav-icon">${icon}</span><span class="nav-label">${cat}</span>
        <span class="nav-cnt">${n}</span>
      </div>`;
    });
  });

  document.getElementById('sidebar').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════════
function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = allTracks.filter(t => {
    if (q && !t.file.toLowerCase().includes(q) && !t.path.toLowerCase().includes(q)) return false;
    if (activeKey === 'all') return true;
    const [src, cat] = activeKey.split(':');
    return cat ? (t.src===src && t.cat===cat) : t.src===src;
  });

  // Update header counts
  document.getElementById('vis-count').textContent = filtered.length;
  ['kie','sa','gs','thor','seth'].forEach((s,i) =>
    document.getElementById(`c${i}`).textContent = filtered.filter(t=>t.src===s).length
  );

  const main = document.getElementById('main');
  if (!filtered.length) { main.innerHTML = `<div class="empty-state">沒有符合的音效</div>`; return; }

  // Group by source then category
  const srcOrder = ['kie','sa','gs','thor','seth'];
  const srcLabels = {kie:'KIE 生成', sa:'SuperAce 原廠', gs:'GoldSlots 原廠', thor:'雷神 (爬取)', seth:'賽特 (爬取)'};
  const multiSrc = srcOrder.filter(s => filtered.some(t=>t.src===s)).length > 1;

  let html = '';
  srcOrder.forEach(src => {
    const srcTracks = filtered.filter(t=>t.src===src);
    if (!srcTracks.isEmpty && srcTracks.length===0) return;
    if (!srcTracks.length) return;
    const si = srcOrder.indexOf(src);
    const cfg = CAT_CFG[src];

    if (multiSrc) html += `<div class="src-bar s${si}">${srcLabels[src]} (${srcTracks.length})</div>`;

    const grouped = {};
    srcTracks.forEach(t => { if (!grouped[t.cat]) grouped[t.cat]=[]; grouped[t.cat].push(t); });

    cfg.order.forEach(cat => {
      const tracks = grouped[cat];
      if (!tracks) return;
      const icon = cfg.icons[cat]||'🎵';
      html += `<div class="sec-head"><h2>${icon} ${cat}</h2><span class="sec-badge b${si}">${tracks.length}</span></div>`;
      tracks.forEach((t,i) => {
        const name = t.file.replace(/\.mp3$/i,'');
        const esc = name.replace(/"/g,'&quot;');
        html += `<div class="track" data-pc="p${si}" data-src="${src}" data-name="${esc}">
          <span class="track-idx">${i+1}</span>
          <div class="track-name" title="${esc}">${name}</div>
          <div class="track-audio"><audio controls preload="none" src="${getAudioSrc(t.path)}"></audio></div>
          <button class="track-dl" onclick="dlFile(${JSON.stringify(t.path)},${JSON.stringify(t.file)})" title="下載">⬇</button>
        </div>`;
      });
    });
  });

  main.innerHTML = html;

  // Audio events
  main.querySelectorAll('.track').forEach(row => {
    const audio = row.querySelector('audio');
    const pc = row.dataset.pc, src = row.dataset.src;
    audio.addEventListener('play', () => {
      if (currentAudio && currentAudio!==audio) {
        currentAudio.pause(); currentAudio.currentTime=0;
        if (currentRow) currentRow.classList.remove('p0','p1','p2','p3','p4');
      }
      currentAudio=audio; currentRow=row;
      row.classList.add(pc);
      const si = ['kie','sa','gs','thor','seth'].indexOf(src);
      document.getElementById('nowDot').className = `now-dot nd${si}`;
      document.getElementById('nowSrc').textContent = srcLabels[src]||src;
      document.getElementById('nowTitle').textContent = row.dataset.name;
      document.getElementById('nowBar').classList.add('visible');
    });
    audio.addEventListener('pause', () => row.classList.remove(pc));
    audio.addEventListener('ended', () => { row.classList.remove(pc); document.getElementById('nowBar').classList.remove('visible'); });
  });
}

const srcLabels = {kie:'KIE 生成', sa:'SuperAce 原廠', gs:'GoldSlots 原廠', thor:'雷神 (爬取)', seth:'賽特 (爬取)'};

function setKey(key, el) {
  activeKey = key;
  document.querySelectorAll('.nav-item,.nav-all').forEach(i=>i.classList.remove('a0','a1','a2','a3','a4','active'));
  if (el) {
    const si = ['kie','sa','gs','thor','seth'].findIndex(s => key===s || key.startsWith(s+':'));
    el.classList.add(si>=0 ? 'a'+si : 'active');
  }
  render();
}
function applyFilter() { render(); }

function getAudioSrc(p){const id=DRIVE_IDS[p];return id?`https://drive.google.com/uc?export=view&id=${id}`:p;}
function getDlUrl(p){const id=DRIVE_IDS[p];return id?`https://drive.usercontent.google.com/download?id=${id}&export=download&authuser=0`:p;}
async function dlFile(path, filename) {
  const url = getDlUrl(path);
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 1000);
  } catch(e) {
    window.open(url, '_blank');
  }
}

// ─── Login (Google OAuth) ────────────────────────────────
const ALLOWED_EMAILS = ['poyuchen0809@gmail.com'];

function handleCredentialResponse(response) {
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = (payload.email || '').toLowerCase();
    const errEl = document.getElementById('login-err');
    const box   = document.getElementById('login-box');
    if (ALLOWED_EMAILS.includes(email)) {
      sessionStorage.setItem('ml_auth', email);
      document.getElementById('login-overlay').classList.add('hidden');
      init();
    } else {
      errEl.textContent = `${email} 沒有存取權限`;
      box.classList.remove('shake');
      void box.offsetWidth;
      box.classList.add('shake');
    }
  } catch(e) {
    document.getElementById('login-err').textContent = '登入失敗，請重試';
  }
}

// Skip login if already authenticated this session
if (sessionStorage.getItem('ml_auth')) {
  document.getElementById('login-overlay').classList.add('hidden');
  init();
}
